<header class="mb-7 grid grid-cols-[minmax(0,1fr)_auto] items-start gap-6 max-[760px]:grid-cols-1">
  <div>
    <h1 class="m-0 text-[24px] leading-tight font-black text-[#11152f]">
      {{ resultCount }} salon{{ resultCount > 1 ? 's' : '' }} trouvé{{ resultCount > 1 ? 's' : '' }}
    </h1>
    @if (searchQuery) {
      <p class="mt-1 text-sm font-bold text-[#69708a]">
        Résultats pour <span class="text-[#7c3aed]">"{{ searchQuery }}"</span>
      </p>
    }
  </div>

  <div class="flex flex-wrap items-center justify-end gap-3 max-[760px]:justify-start">
    <span class="text-sm font-bold text-[#66708d]">Trier par :</span>

    <!-- Select Trier par : bg-none supprime la flèche SVG ajoutée par @tailwindcss/forms -->
    <div class="relative">
      <select
        class="h-9 min-w-[148px] appearance-none bg-none bg-white rounded-full border border-[#e7e9f4] pl-4 pr-8 text-sm font-bold text-[#303653] outline-none cursor-pointer focus:border-[#7c3aed] focus:ring-2 focus:ring-[#7c3aed]/20"
        [value]="sortBy"
        (change)="sortChange.emit($any($event.target).value)"
      >
        <option value="RELEVANCE">Pertinence</option>
        <option value="RATING">Meilleures notes</option>
        <option value="PRICE_ASC">Prix croissant</option>
        <option value="PRICE_DESC">Prix décroissant</option>
      </select>
      <lucide-icon class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-[#59617b]" name="chevron-down" [size]="15" [strokeWidth]="2.2" aria-hidden="true" />
    </div>

    <!-- Toggle vue Liste / Cartes : classes retournées par méthode pour Tailwind JIT -->
    <div class="flex h-9 overflow-hidden rounded-full border border-[#e7e9f4] bg-white">
      <button
        [class]="getGridBtnClass()"
        type="button"
        aria-label="Vue grille"
        (click)="viewModeChange.emit('GRID')"
      >
        <lucide-icon name="layout-grid" [size]="16" [strokeWidth]="2.1" aria-hidden="true" />
      </button>
      <button
        [class]="getListBtnClass()"
        type="button"
        aria-label="Vue liste"
        (click)="viewModeChange.emit('LIST')"
      >
        <lucide-icon name="list" [size]="17" [strokeWidth]="2.1" aria-hidden="true" />
      </button>
    </div>
  </div>
</header>
