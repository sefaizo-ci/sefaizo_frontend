<article class="min-w-0 overflow-hidden rounded-lg border border-[#e7e9f4] bg-white shadow-[0_4px_18px_rgba(44,39,117,0.07)] transition-transform hover:-translate-y-0.5">
  <div class="h-[205px] overflow-hidden bg-[#ded8ff] max-[520px]:h-48">
    <img
      class="h-full w-full object-cover transition-transform duration-300 hover:scale-105"
      [src]="business.coverImage || business.avatar"
      [alt]="business.name"
      loading="lazy"
    />
  </div>

  <div class="p-4 pb-[18px]">
    <div class="grid grid-cols-[minmax(0,1fr)_auto] items-start gap-3 max-[520px]:grid-cols-1 max-[520px]:gap-1">
      <h2 class="m-0 text-[18px] leading-tight font-black text-[#11152f]">{{ business.name }}</h2>
      <span class="inline-flex shrink-0 items-center gap-1 text-sm font-bold text-[#566079] max-[520px]:justify-self-start">
        <lucide-icon class="fill-[#ffb224] text-[#ffb224]" name="star" [size]="15" [strokeWidth]="2.2" aria-hidden="true" />
        {{ business.rating.toFixed(1) }} ({{ business.reviewCount }} avis)
      </span>
    </div>

    <p class="mt-2 mb-3 inline-flex items-center gap-1 text-sm font-bold text-[#66708d]">
      <lucide-icon name="map-pin" [size]="15" [strokeWidth]="2.1" aria-hidden="true" />
      {{ business.city }}
    </p>

    <div class="mb-4 flex flex-wrap gap-2">
      @for (cat of business.categories.slice(0, 3); track cat) {
        <span class="rounded-md bg-[#f0f1f6] px-3 py-1.5 text-xs font-bold text-[#303653]">{{ cat }}</span>
      }
    </div>

    <div class="grid grid-cols-[minmax(0,1fr)_124px] items-center gap-4 max-[520px]:grid-cols-1">
      <strong class="text-base font-black text-[#5b35f6]">À partir de {{ minPrice | fcfa }}</strong>
      <a
        class="inline-flex h-10 items-center justify-center rounded-full bg-[#5b35f6] px-4 text-sm font-extrabold text-white shadow-[0_10px_22px_rgba(91,53,246,0.25)] transition-transform hover:-translate-y-0.5 hover:bg-[#4d28dc]"
        [routerLink]="['/pro', business.slug]"
      >Voir le salon</a>
    </div>
  </div>
</article>
