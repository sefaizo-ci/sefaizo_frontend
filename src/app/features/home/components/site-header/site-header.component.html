<header class="sticky top-0 z-20 border-b border-border/70 bg-white/95 backdrop-blur-lg">
  <div class="app-container grid min-h-[76px] grid-cols-[auto_1fr_auto] items-center gap-8 max-[960px]:flex max-[960px]:justify-between max-[960px]:gap-3 max-[520px]:min-h-[68px]">
    <a class="text-[32px] leading-none font-black text-primary max-[520px]:text-[27px]" href="#" aria-label="SEFAIZO accueil">SEFAIZO</a>

    <nav class="flex justify-center gap-8 max-[960px]:hidden" aria-label="Navigation principale">
      @for (item of navItems; track item) {
        <a
          class="relative text-sm font-extrabold text-[#5f657f] transition-colors after:absolute after:right-0 after:-bottom-[22px] after:left-0 after:h-[3px] after:rounded-full after:bg-primary after:content-['']"
          href="#"
          [class.text-primary]="item === 'Accueil'"
          [class.after:hidden]="item !== 'Accueil'"
        >
          {{ item }}
        </a>
      }
    </nav>

    <div class="flex gap-3.5 max-[960px]:hidden">
      <a class="inline-flex min-h-11 items-center justify-center rounded-md border border-primary bg-white px-6 text-[13px] font-extrabold text-primary transition-transform hover:-translate-y-0.5 focus-visible:outline-3 focus-visible:outline-offset-3 focus-visible:outline-primary/30" href="#">Se connecter</a>
      <a class="inline-flex min-h-11 items-center justify-center rounded-md bg-primary px-6 text-[13px] font-extrabold text-white shadow-[0_10px_22px_rgba(91,53,246,0.25)] transition-transform hover:-translate-y-0.5 hover:bg-primary-600 focus-visible:outline-3 focus-visible:outline-offset-3 focus-visible:outline-primary/30" href="#">Réserver maintenant</a>
    </div>
  </div>
</header>
