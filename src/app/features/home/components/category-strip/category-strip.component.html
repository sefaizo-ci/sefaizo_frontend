<section class="bg-white py-8 pb-9 max-[520px]:py-6 max-[520px]:pb-7">
  <div class="app-container grid grid-cols-6 gap-4 max-[860px]:grid-cols-3 max-[520px]:grid-cols-2">
    @for (category of categories; track category.id) {
      <button
        type="button"
        (click)="navigateToSearch(category)"
        class="flex min-h-[108px] flex-col items-center justify-center gap-3 rounded-lg text-center text-[#11152f] group cursor-pointer bg-transparent border-0 p-2 transition-all hover:bg-[#f7f5ff]"
        [attr.aria-label]="'Explorer ' + category.label"
      >
        <span class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-[#eee9ff] text-[#7c3aed] transition-transform group-hover:-translate-y-1 group-hover:bg-[#e0d8ff]">
          <lucide-icon [name]="iconNames[category.icon] || fallbackIconName" [size]="32" [strokeWidth]="2.1" aria-hidden="true" />
        </span>
        <strong class="text-sm font-black">{{ category.label }}</strong>
      </button>
    }
  </div>
</section>
