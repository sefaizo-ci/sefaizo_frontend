<section class="bg-white py-8 pb-9 max-[520px]:py-6 max-[520px]:pb-7">
  <div class="app-container grid grid-cols-6 gap-4 max-[860px]:grid-cols-3 max-[520px]:grid-cols-2">
    @for (category of categories; track category.id) {
      <a class="flex min-h-[108px] flex-col items-center justify-center gap-3 rounded-lg text-center text-ink group" href="#">
        <span class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-primary-100 text-primary transition-transform group-hover:-translate-y-0.5">
          <lucide-icon [img]="icons[category.icon] || fallbackIcon" [size]="32" [strokeWidth]="2.1" aria-hidden="true" />
        </span>
        <strong class="text-sm font-black">{{ category.label }}</strong>
      </a>
    }
  </div>
</section>
