<article class="overflow-hidden rounded-lg border border-[#e7e9f4] bg-white shadow-[0_10px_26px_rgba(44,39,117,0.1)]">
  <div class="relative h-[164px] bg-[#ded8ff] after:absolute after:inset-0 after:bg-gradient-to-b after:from-[#0c0e22]/10 after:to-[#0c0e22]/0 after:content-[''] max-[520px]:h-44">
    <img class="h-full w-full object-cover" [src]="business.imageUrl" [alt]="business.name" loading="lazy" />
    <span class="absolute top-3.5 left-3.5 z-10 min-h-7 rounded-md bg-[#5b35f6] px-2.5 py-1.5 text-xs leading-tight font-extrabold text-white">{{ business.badge || business.categoryLabel }}</span>
    <button
      class="absolute top-3 right-3 z-10 inline-flex h-[34px] w-[34px] items-center justify-center rounded-full border-0 bg-white/95 text-[#6c7289] focus-visible:outline-[3px] focus-visible:outline-offset-[3px] focus-visible:outline-[#5b35f6]/30"
      type="button"
      [attr.aria-label]="'Ajouter ' + business.name + ' aux favoris'"
    >
      <lucide-icon name="heart" [size]="20" [strokeWidth]="2.2" aria-hidden="true" />
    </button>
  </div>

  <div class="p-4 pb-3.5">
    <div class="grid grid-cols-[minmax(0,1fr)_auto] items-start gap-3.5 max-[520px]:grid-cols-1 max-[520px]:gap-1.5">
      <h3 class="m-0 min-w-0 text-base leading-snug font-black text-[#11152f]">{{ business.name }}</h3>
      <span class="inline-flex shrink-0 items-center gap-1 text-xs font-bold text-[#69708a]">
        <lucide-icon class="fill-[#ffb224] text-[#ffb224]" name="star" [size]="14" [strokeWidth]="2.3" aria-hidden="true" />
        {{ business.rating.toFixed(1) }} ({{ business.reviewCount }})
      </span>
    </div>

    <p class="my-2.5 mb-3.5 inline-flex items-center gap-1 text-[13px] font-bold text-[#727994]">
      <lucide-icon name="map-pin" [size]="15" [strokeWidth]="2.1" aria-hidden="true" />
      {{ business.location }}
    </p>

    <div class="flex items-center justify-between gap-3 max-[520px]:flex-col max-[520px]:items-stretch">
      <strong class="text-sm font-black text-[#5b35f6]">À partir de {{ business.startingPrice | homePrice }}</strong>
      <a
        class="inline-flex min-h-9 items-center justify-center rounded-full bg-[#5b35f6] px-[18px] text-xs font-extrabold text-white shadow-[0_10px_22px_rgba(91,53,246,0.25)] transition-transform hover:-translate-y-0.5 hover:bg-[#4d28dc] focus-visible:outline-[3px] focus-visible:outline-offset-[3px] focus-visible:outline-[#5b35f6]/30 max-[520px]:w-full"
        href="#"
      >Réserver</a>
    </div>
  </div>
</article>
